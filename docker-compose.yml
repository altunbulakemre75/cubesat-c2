# CubeSat C2 — Development Environment
# Usage: docker compose up

services:
  # === TimescaleDB (PostgreSQL + time-series extension) ===
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: cubesat-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cubesat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-cubesat_c2}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cubesat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis (cache & pub/sub) ===
  redis:
    image: redis:7-alpine
    container_name: cubesat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === NATS JetStream (message bus) ===
  nats:
    image: nats:alpine
    container_name: cubesat-nats
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP management
    volumes:
      - nats-data:/data
    restart: unless-stopped

