# CubeSat C2 — Development Environment
# Usage: docker compose up

services:
  # === TimescaleDB (PostgreSQL + time-series extension) ===
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: cubesat-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cubesat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-cubesat_c2}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cubesat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis (cache & pub/sub) ===
  redis:
    image: redis:7-alpine
    container_name: cubesat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === NATS JetStream (message bus) ===
  nats:
    image: nats:alpine
    container_name: cubesat-nats
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP management
    volumes:
      - nats-data:/data
    restart: unless-stopped

  # === Backend API (FastAPI) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cubesat-backend
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-cubesat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
      - POSTGRES_DB=${POSTGRES_DB:-cubesat_c2}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=true
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Satellite Simulator ===
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: cubesat-simulator
    depends_on:
      nats:
        condition: service_started
    environment:
      - SIM_NATS_URL=nats://nats:4222
      - SIM_SATELLITES=CUBESAT1,CUBESAT2,CUBESAT3
      - SIM_INTERVAL_S=1.0
      - SIM_FAULT_PROBABILITY=0.001
    restart: unless-stopped

  # === Frontend (React + Vite, served via nginx) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cubesat-frontend
    ports:
      - "3000:80"   # nginx serving built React app
    depends_on:
      - backend
    restart: unless-stopped

  # === Prometheus (metrics scraper) ===
  prometheus:
    image: prom/prometheus:latest
    container_name: cubesat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # === Grafana (dashboards) ===
  grafana:
    image: grafana/grafana:latest
    container_name: cubesat-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # === Loki (log aggregation) ===
  loki:
    image: grafana/loki:2.9.0
    container_name: cubesat-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./deployment/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    restart: unless-stopped

  # === Promtail (log shipper — tails container logs to Loki) ===
  promtail:
    image: grafana/promtail:2.9.0
    container_name: cubesat-promtail
    volumes:
      - ./deployment/loki/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  timescaledb-data:
  redis-data:
  nats-data:
  grafana-data:
  loki-data:

networks:
  default:
    name: cubesat-net
