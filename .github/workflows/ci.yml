name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        # Don't fail the build on lint warnings yet — surface them as
        # annotations and tighten the rule set in a follow-up.
        run: |
          pip install ruff
          ruff check src tests --output-format=github || true

      - name: Run backend tests
        working-directory: backend
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true   # codecov token may not be configured
        with:
          files: backend/coverage.xml

  test-simulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install simulator deps
        working-directory: simulator
        run: pip install -e ".[dev]"

      - name: Run simulator tests
        working-directory: simulator
        run: pytest tests/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, test-simulator, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Boot the stack
        run: |
          cp .env.example .env
          # Auto-generate JWT secret so DEBUG=false works in CI.
          echo "JWT_SECRET_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(48))')" >> .env
          echo "DEBUG=false" >> .env
          docker compose up -d --build backend simulator timescaledb redis nats

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "backend ready"; break
            fi
            sleep 2
          done

      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright (against host vite + dockerised backend)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: |
          npm run build
          npx vite preview --port 3000 --host &
          sleep 5
          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-simulator, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cubesat-c2/backend:latest ./backend

      - name: Build simulator image
        run: docker build -t cubesat-c2/simulator:latest ./simulator

      - name: Build frontend image
        run: docker build -t cubesat-c2/frontend:latest ./frontend
