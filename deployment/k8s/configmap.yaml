apiVersion: v1
kind: ConfigMap
metadata:
  name: cubesat-config
  namespace: cubesat-c2
  labels:
    app.kubernetes.io/name: cubesat-c2
    app.kubernetes.io/component: config
data:
  # Database
  POSTGRES_HOST: "timescaledb"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "cubesat_c2"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # NATS
  NATS_URL: "nats://nats:4222"

  # Application
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://cubesat.example.com"

  # Auth
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "60"

  # Simulator
  SIM_SATELLITES: "CUBESAT1,CUBESAT2,CUBESAT3"
  SIM_INTERVAL_S: "1.0"
  SIM_FAULT_PROBABILITY: "0.001"
