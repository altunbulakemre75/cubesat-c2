---
# Deployment for the React frontend (nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cubesat-c2
  labels:
    app.kubernetes.io/name: cubesat-c2
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: cubesat-c2
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: cubesat-c2/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

---
# Service for the frontend
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cubesat-c2
  labels:
    app.kubernetes.io/name: cubesat-c2
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http

---
# Ingress — exposes frontend externally and routes /api/* to backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cubesat-ingress
  namespace: cubesat-c2
  labels:
    app.kubernetes.io/name: cubesat-c2
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Uncomment to enable TLS via cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # Uncomment and fill in to enable HTTPS:
  # tls:
  #   - hosts:
  #       - cubesat.example.com
  #     secretName: cubesat-tls
  rules:
    - host: cubesat.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
